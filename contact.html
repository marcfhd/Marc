<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechHub - Contact</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- CSS -->
  <link rel="stylesheet" href="contact.css">
</head>

<body>

<div id="navbar"></div>
<script src="navbar.js"></script>

<div class="container mt-5">

  <h2 class="text-center mb-5 fw-bold">Contact Us</h2>

  <div class="row g-4 justify-content-center">

    <div class="col-md-4">
      <div class="contact-card text-center">
        <div class="icon-box">
          <i class="fa fa-location-dot"></i>
        </div>
        <h5 class="mt-3">Address</h5>
        <p>Beirut, Lebanon</p>
      </div>
    </div>

    <div class="col-md-4">
      <div class="contact-card text-center">
        <div class="icon-box">
          <i class="fa fa-phone"></i>
        </div>
        <h5 class="mt-3">Phone</h5>
        <p>+961 70 123 456</p>
      </div>
    </div>

    <div class="col-md-4">
      <div class="contact-card text-center">
        <div class="icon-box">
          <i class="fa fa-envelope"></i>
        </div>
        <h5 class="mt-3">Email</h5>
        <p>contact@techhub.com</p>
      </div>
    </div>

<div class="text-center mt-5 quote-box">

  <i class="fa fa-quote-left fa-2x mb-3"></i>

  <p class="quote-text">
    "Thank you for reaching out to us. We’re always here to help and answer your questions."
  </p>

  <small class="text-muted">— TechHub Team</small>

</div>

  </div>

</div>

</body>
</html>
