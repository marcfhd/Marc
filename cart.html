<!DOCTYPE html>
<html lang="en">
<head>
<title>TechHub - Cart</title>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="navbar"></div>
<script src="navbar.js"></script>
<div class="container mt-5 mb-5">

  <h2 class="mb-4 text-center">🛒 Shopping Cart</h2>

  <table class="table table-bordered text-center align-middle">

    <thead class="table-dark">
      <tr>
        <th>Product</th>
        <th>Price</th>
        <th>Quantity</th>
        <th>Total</th>
        <th>Remove</th>
      </tr>
    </thead>

    <tbody>

      <tr>
        <td>
          <img src="https://images.unsplash.com/photo-1587202372775-e229f172b9d7" width="60" class="me-2">
          Gaming GPU
        </td>
        <td>$500</td>
        <td>
          <input type="number" value="1" min="1" class="form-control quantity">
        </td>
        <td>$500</td>
        <td>
          <button class="btn btn-danger btn-sm">
            <i class="fa fa-trash"></i>
          </button>
        </td>
      </tr>

      <tr>
        <td>
          <img src="https://images.unsplash.com/photo-1593642634367-d91a135587b5" width="60" class="me-2">
          Mechanical Keyboard
        </td>
        <td>$120</td>
        <td>
          <input type="number" value="1" min="1" class="form-control quantity">
        </td>
        <td>$120</td>
        <td>
          <button class="btn btn-danger btn-sm">
            <i class="fa fa-trash"></i>
          </button>
        </td>
      </tr>

    </tbody>

  </table>

  <div class="text-end">
    <h4>Total: <span class="text-primary">$620</span></h4>
    <a href="checkout.html" class="btn btn-success mt-2">Proceed to Checkout</a>
  </div>

</div>
</body>
</html>
