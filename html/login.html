<!DOCTYPE html>
<html lang="en">
<head>
  <title>TechHub - Login</title>
  <!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../css/login.css">
</head>

<body>

<div class="card login-card shadow p-4">

  <h3 class="text-center mb-4">Login to TechHub</h3>

  <form action="../login.php" method="post">

          <div class="mb-3">
  <label class="form-label">UserName</label>
  <input type="text" name="username" class="form-control" placeholder="Enter your name" required>
</div>
    <div class="mb-3">
  <label class="form-label">Password</label>
  <div class="input-group">
    <input type="password" name="pass" class="form-control" id="password" placeholder="Enter password" required>
    <span class="input-group-text" onclick="togglePassword()" style="cursor:pointer;">
      <i class="fa-solid fa-eye" id="eyeIcon"></i>
    </span>
  </div>
</div>

    <div class="d-flex justify-content-between mb-3">
      <div>
        <input type="checkbox"  name="remember"> Remember me
      </div>
      <a href="forgetpass.html " class="small">Forgot password?</a>
    </div>

    <button type="submit" name="login" class="btn btn-primary w-100">
      Login
    </button>

  </form>

  <div class="text-center mt-3">
    Don't have an account?
    <a href="signup.html" class="signup-link">Sign Up</a>
  </div>
  <div id="error-msg" class="alert alert-danger text-center" style="display:none;"></div>
<div id="success-msg" class="alert alert-success text-center" style="display:none;"></div>

</div>
<script>
function togglePassword() {
  let input = document.getElementById("password");
  let icon = document.getElementById("eyeIcon");

  if (input.type === "password") {
    input.type = "text";
    icon.classList.remove("fa-eye");
    icon.classList.add("fa-eye-slash");
  } else {
    input.type = "password";
    icon.classList.remove("fa-eye-slash");
    icon.classList.add("fa-eye");
  }
}

let params = new URLSearchParams(window.location.search);
let error = params.get("error");
let success = params.get("success");
let errorDiv = document.getElementById("error-msg");
let successDiv = document.getElementById("success-msg");
if (error) {
  errorDiv.style.display = "block";
  if (error === "invalid") {
    errorDiv.innerText = "Wrong username or password";
  } else if (error === "blocked") {
    errorDiv.innerText = "Your account is blocked";
  } else if (error === "empty") {
    errorDiv.innerText = "Please fill all fields";
  }
}
if (success === "signup") {
  successDiv.style.display = "block";
  successDiv.innerText = "Signup successful. Please login.";
}
window.history.replaceState({}, document.title, window.location.pathname);
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
