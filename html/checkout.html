<!DOCTYPE html>
<html lang="en">
<head>
  <title>TechHub - Checkout</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../css/checkout.css">
</head>
<body>

  <div id="navbar"></div>
  <script src="../navbar.js"></script>

  <div class="container my-5">
    <div class="row">

      <div class="col-lg-7">
        <div class="card p-4 shadow-sm">
          <h4 class="mb-4">Billing Details</h4>

          <form id="checkout-form">
            <div class="row">
              <div class="col-md-6 mb-3">
                <label>First Name</label>
                <input type="text" class="form-control" id="firstName" required>
              </div>

              <div class="col-md-6 mb-3">
                <label>Last Name</label>
                <input type="text" class="form-control" id="lastName" required>
              </div>
            </div>

            <div class="mb-3">
              <label>Email</label>
              <input type="email" class="form-control" id="email" required>
            </div>

            <div class="mb-3">
              <label>Address</label>
              <input type="text" class="form-control" id="address" required>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label>City</label>
                <input type="text" class="form-control" id="city" required>
              </div>

              <div class="col-md-6 mb-3">
                <label>Zip Code</label>
                <input type="text" class="form-control" id="zipCode" required>
              </div>
            </div>

            <hr>

            <h5 class="mb-3">Payment Method</h5>

            <div class="form-check mb-2">
              <input class="form-check-input" type="radio" checked>
              <label class="form-check-label">
                Cash on Delivery (COD)
              </label>
            </div>

            <div class="alert alert-info mt-3">
              You will pay when the order arrives at your address.
            </div>
          </form>
        </div>
      </div>

      <div class="col-lg-5">
        <div class="card p-4 shadow-sm">
          <h4 class="mb-4">Order Summary</h4>

          <div id="checkout-items"></div>

          <hr>

          <div class="d-flex justify-content-between fw-bold">
            <span>Total</span>
            <span id="checkout-total">$0</span>
          </div>
           <div id="order-message" class="mt-3"></div>

          <button class="btn btn-primary w-100 mt-4" id="place-order-btn">
            <i class="fas fa-lock"></i> Place Order
          </button>
        </div>
      </div>

    </div>
  </div>
  <script>
document.getElementById("place-order-btn").onclick = function () {

    let address = document.getElementById("address").value;
    let total = document.getElementById("checkout-total").innerText.replace("$", "");
    let message = document.getElementById("order-message");

    if (address === "") {
        message.innerHTML = "<div class='alert alert-danger'>Please enter your address</div>";
        return;
    }

    fetch("../place_order.php", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "address=" + address + "&total_price=" + total
    })
    .then(res => res.text())
    .then(data => {
        if (data === "success") {
            message.innerHTML = "<div class='alert alert-success'>Order placed successfully!</div>";
        } else {
            message.innerHTML = "<div class='alert alert-danger'>" + data + "</div>";
        }
    });

};
</script>
 

  <script src="../checkout.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
