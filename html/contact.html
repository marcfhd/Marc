<head>

 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

<div class="container mt-5">

  <h2 class="text-center mb-5 fw-bold">Contact Us</h2>

  <div class="row g-4 justify-content-center">

    </div>

    <div class="col-md-4">
      <div class="contact-card text-center">

          <i class="fa fa-phone"></i>
        </div>
        <h5 class="mt-3">Phone</h5>
        <p>+961 81 930995</p>
      </div>
    </div>

    <div class="col-md-4">
      <div class="contact-card text-center">
        <div class="icon-box">
          <i class="fa fa-envelope"></i>
        </div>
        <h5 class="mt-3">Email</h5>
        <p>marc.fahed13@gmail.com</p>
      </div>
    </div>

<div class="text-center mt-5 quote-box">

  <i class="fa fa-quote-left fa-2x mb-3"></i>

  <p class="quote-text">
    "Thank you for reaching out to us. We’re always here to help and answer your questions."
  </p>

  <small class="text-muted">— TechHub Team</small>

</div>

  </div>

</div>
