<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechHub - Cart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../css/cart.css">

</head>
<body>

<div id="navbar"></div>
<script src="../navbar.js"></script>

<div class="container my-5">

  <h2 class="mb-4 text-center">🛒 Shopping Cart</h2>

  <div class="table-responsive shadow-sm rounded">
    <table class="table table-hover align-middle text-center mb-0">
      <thead class="table-dark">
        <tr>
          <th>Product</th>
          <th>Price</th>
          <th>Quantity</th>
          <th>Total</th>
          <th>Remove</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="d-flex align-items-center">
            <img src="https://images.unsplash.com/photo-1587202372775-e229f172b9d7?w=100&h=100&fit=crop" class="me-3 product-img">
            Gaming GPU
          </td>
          <td>$500</td>
          <td>
            <input type="number" value="1" min="1" class="form-control quantity">
          </td>
          <td>$500</td>
          <td>
            <button class="btn btn-danger btn-sm">
              <i class="fa fa-trash"></i>
            </button>
          </td>
        </tr>

        <tr>
          <td class="d-flex align-items-center">
           <img src="https://images.unsplash.com/photo-1593642634367-d91a135587b5?w=100&h=100&fit=crop" class="me-3 product-img">
            Mechanical Keyboard
          </td>
          <td>$120</td>
          <td>
            <input type="number" value="1" min="1" class="form-control quantity">
          </td>
          <td>$120</td>
          <td>
            <button class="btn btn-danger btn-sm">
              <i class="fa fa-trash"></i>
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="text-end mt-4">
    <h4>Total: <span class="text-primary">$620</span></h4>
    <a href="checkout.html" class="btn btn-success mt-2">Proceed to Checkout</a>
  </div>

</div>
<script src="../cart.js"></script>
</body>
</html>
