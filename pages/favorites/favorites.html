<!DOCTYPE html>
<html lang="en">
<head>
  <title>TechHub - Favorites</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <div id="navbar"></div>

  <!-- Favorites Section -->
  <div class="container mt-5 mb-5 text-center">

    <h2 class="mb-4">❤️ Your Favorites</h2>

    <!-- No favorites message -->
    <div id="no-favorites" class="text-muted py-5">
      <i class="fa-solid fa-heart fa-3x mb-3"></i>
      <h5>You have no favorite products yet.</h5>
      <a href="products.html" class="btn btn-primary mt-3">Browse Products</a>
    </div>

    <!-- Favorites list (hidden if empty) -->
    <div class="row" id="favorites-list">
      <!-- Example product card template -->
      <div class="col-md-4 mb-4">
        <div class="card h-100 shadow-sm text-center">
          <img src="" class="card-img-top" alt="">
          <div class="card-body">
            <h5 class="card-title"></h5>
            <p class="card-text">yfjytfj</p>
            <button class="btn btn-danger btn-sm remove-fav">
              <i class="fa fa-trash"></i> Remove
            </button>
          </div>
        </div>
      </div>
    </div>

  </div>

 <script src="../../Layout/navbar.js"></script>
 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
