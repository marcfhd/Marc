<!DOCTYPE html>
<html lang="en">
<head>
  <title>TechHub - Login</title>
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="login.css">
</head>

<body>

<div class="card login-card shadow p-4">

  <h3 class="text-center mb-4">Login to TechHub</h3>
  <div id="loginMessage"></div>

  <form id="loginForm">

    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Password</label>
      <div class="input-group">
        <input type="password" class="form-control" id="password" placeholder="Enter password" required>
        <span class="input-group-text" onclick="togglePassword()" style="cursor:pointer;">
          <i class="fa-solid fa-eye" id="eyeIcon"></i>
        </span>
      </div>
    </div>

    <div class="d-flex justify-content-between mb-3">
      <div>
        <input type="checkbox" id="rememberMe"> Remember me
      </div>
      <a href="forgetpass.html" class="small">Forgot password?</a>
    </div>

    <button type="submit" class="btn btn-primary w-100">
      Login
    </button>

  </form>

  <div class="text-center mt-3">
    Don't have an account?
    <a href="signup.html" class="signup-link">Sign Up</a>
  </div>

</div>
<script>
function togglePassword() {
  let input = document.getElementById("password");
  let icon = document.getElementById("eyeIcon");

  if (input.type === "password") {
    input.type = "text";
    icon.classList.remove("fa-eye");
    icon.classList.add("fa-eye-slash");
  } else {
    input.type = "password";
    icon.classList.remove("fa-eye-slash");
    icon.classList.add("fa-eye");
  }
}

document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();
  
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const rememberMe = document.getElementById('rememberMe').checked;
  const messageDiv = document.getElementById('loginMessage');
  
  if (loginUser(email, password)) {
    if (rememberMe) {
      localStorage.setItem('rememberMe', 'true');
      localStorage.setItem('rememberedEmail', email);
    }
    messageDiv.innerHTML = '<div class="alert alert-success" role="alert">Login successful! Redirecting...</div>';
    setTimeout(() => {
      const redirectPage = localStorage.getItem('redirectAfterLogin');
      if (redirectPage) {
        localStorage.removeItem('redirectAfterLogin');
        window.location.href = redirectPage;
      } else {
        window.location.href = '../../index.html';
      }
    }, 1000);
  } else {
    messageDiv.innerHTML = '<div class="alert alert-danger" role="alert">Invalid email or password!</div>';
  }
});
</script>
</body>
</html>
