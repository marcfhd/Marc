<!DOCTYPE html>
<html lang="en">
<head>
  <title>Sign Up - TechHub</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="signup.css">
</head>

<body>

<main>
  <div class="card signup-card shadow-sm">
    
    <div class="card-header">
      Create Your Account
    </div>

    <div class="card-body">

      <div id="signupMessage"></div>

      <form id="signupForm">

        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
        </div>

        <div class="mb-3">
          <label class="form-label">UserName</label>
          <input type="text" id="username" class="form-control" placeholder="Enter your name" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" id="fullname" class="form-control" placeholder="Enter your name" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <div class="input-group">
            <input type="password" id="password" class="form-control" placeholder="Create a password" required>
            <span class="input-group-text" onclick="togglePassword('password','eye1')">
              <i class="fa-solid fa-eye" id="eye1"></i>
            </span>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Confirm Password</label>
          <div class="input-group">
            <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm password" required>
            <span class="input-group-text" onclick="togglePassword('confirmPassword','eye2')">
              <i class="fa-solid fa-eye" id="eye2"></i>
            </span>
          </div>
        </div>

        <button type="submit" class="btn btn-primary">Sign Up</button>

        <p class="text-center mt-3 small">
          Already have an account? <a href="/pages/auth/login.html">Login</a>
        </p>

      </form>
    </div>
  </div>
</main>

<script>
function togglePassword(fieldId, iconId) {
  const input = document.getElementById(fieldId);
  const icon = document.getElementById(iconId);

  if (input.type === "password") {
    input.type = "text";
    icon.classList.replace("fa-eye", "fa-eye-slash");
  } else {
    input.type = "password";
    icon.classList.replace("fa-eye-slash", "fa-eye");
  }
}

document.getElementById("signupForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const password = document.getElementById("password").value;
  const confirmPassword = document.getElementById("confirmPassword").value;
  const messageDiv = document.getElementById("signupMessage");

  if (password !== confirmPassword) {
    messageDiv.innerHTML =
      '<div class="alert alert-danger">Passwords do not match!</div>';
    return;
  }

  messageDiv.innerHTML =
    '<div class="alert alert-success">Account created successfully!</div>';
});
</script>

</body>
</html>
