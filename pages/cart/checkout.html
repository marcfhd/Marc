<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechHub - Checkout</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="cart.css">
</head>
<body>

<div id="navbar"></div>

<div class="container my-5">
  <h2 class="mb-4 text-center">Checkout</h2>

  <div class="row">
    <div class="col-md-6">
      <div class="card shadow-sm p-4">
        <h4 class="mb-4">Billing Information</h4>
        
        <form>
          <div class="mb-3">
            <label for="fullname" class="form-label">Full Name</label>
            <input type="text" class="form-control" id="fullname" required>
          </div>

          <div class="mb-3">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" class="form-control" id="email" required>
          </div>

          <div class="mb-3">
            <label for="address" class="form-label">Address</label>
            <input type="text" class="form-control" id="address" required>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="city" class="form-label">City</label>
              <input type="text" class="form-control" id="city" required>
            </div>
            <div class="col-md-6 mb-3">
              <label for="zip" class="form-label">ZIP Code</label>
              <input type="text" class="form-control" id="zip" required>
            </div>
          </div>

          <div class="mb-3">
            <label for="phone" class="form-label">Phone Number</label>
            <input type="tel" class="form-control" id="phone" required>
          </div>
        </form>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card shadow-sm p-4">
        <h4 class="mb-4">Order Summary</h4>
        
        <div class="mb-3 pb-3 border-bottom">
          <div class="d-flex justify-content-between mb-2">
            <span>Gaming GPU x 1</span>
            <span>$500.00</span>
          </div>
          <div class="d-flex justify-content-between">
            <span>Mechanical Keyboard x 1</span>
            <span>$120.00</span>
          </div>
        </div>

        <div class="mb-3">
          <div class="d-flex justify-content-between">
            <span>Subtotal:</span>
            <span>$620.00</span>
          </div>
          <div class="d-flex justify-content-between">
            <span>Shipping:</span>
            <span>$0.00</span>
          </div>
          <div class="d-flex justify-content-between">
            <span>Tax:</span>
            <span>$62.00</span>
          </div>
        </div>

        <div class="border-top pt-3 mb-4">
          <div class="d-flex justify-content-between fs-5 fw-bold">
            <span>Total:</span>
            <span class="text-primary">$682.00</span>
          </div>
        </div>

        <h4 class="mb-3">Payment Method</h4>
        <div class="mb-3">
          <label for="cardname" class="form-label">Cardholder Name</label>
          <input type="text" class="form-control" id="cardname" required>
        </div>

        <div class="mb-3">
          <label for="cardnum" class="form-label">Card Number</label>
          <input type="text" class="form-control" id="cardnum" placeholder="1234 5678 9012 3456" required>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label for="expiry" class="form-label">Expiry Date (MM/YY)</label>
            <input type="text" class="form-control" id="expiry" placeholder="03/26" required>
          </div>
          <div class="col-md-6 mb-3">
            <label for="cvv" class="form-label">CVV</label>
            <input type="text" class="form-control" id="cvv" placeholder="123" required>
          </div>
        </div>

        <button type="submit" class="btn btn-success w-100 mt-3">Complete Order</button>
        <a href="cart.html" class="btn btn-secondary w-100 mt-2">Back to Cart</a>
      </div>
    </div>
  </div>
</div>

<footer class="bg-dark text-white text-center py-3 mt-5">
  <p class="mb-0">&copy; 2026 TechHub. All Rights Reserved.</p>
</footer>

<script src="../../Layout/navbar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
